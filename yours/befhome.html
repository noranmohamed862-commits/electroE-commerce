<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElectroSky - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Rajdhani', sans-serif; background: #000; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
      .intro-container { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f23 100%); overflow: hidden; }
      .particles { position: absolute; width: 100%; height: 100%; overflow: hidden; }
      .particle { position: absolute; width: 3px; height: 3px; background: rgba(59,130,246,0.6); border-radius: 50%; animation: float 15s infinite ease-in-out; box-shadow: 0 0 10px rgba(59,130,246,0.8); }
      .particle:nth-child(1)  { left: 10%; animation-delay: 0s;   animation-duration: 12s; }
      .particle:nth-child(2)  { left: 20%; animation-delay: 2s;   animation-duration: 15s; }
      .particle:nth-child(3)  { left: 30%; animation-delay: 1s;   animation-duration: 10s; }
      .particle:nth-child(4)  { left: 40%; animation-delay: 3s;   animation-duration: 14s; }
      .particle:nth-child(5)  { left: 50%; animation-delay: 1.5s; animation-duration: 11s; }
      .particle:nth-child(6)  { left: 60%; animation-delay: 2.5s; animation-duration: 13s; }
      .particle:nth-child(7)  { left: 70%; animation-delay: 0.5s; animation-duration: 16s; }
      .particle:nth-child(8)  { left: 80%; animation-delay: 3.5s; animation-duration: 12s; }
      .particle:nth-child(9)  { left: 90%; animation-delay: 1s;   animation-duration: 14s; }
      .particle:nth-child(10) { left: 15%; animation-delay: 2s;   animation-duration: 15s; }
      @keyframes float { 0%,100% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) scale(1); opacity: 0; } }
      .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(59,130,246,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.1) 1px, transparent 1px); background-size: 50px 50px; animation: gridMove 20s linear infinite; opacity: 0.3; }
      @keyframes gridMove { 0% { transform: perspective(500px) rotateX(60deg) translateY(0); } 100% { transform: perspective(500px) rotateX(60deg) translateY(50px); } }
      .intro-content { position: relative; z-index: 10; text-align: center; animation: fadeInUp 1.5s ease-out; }
      .logo-container { margin-bottom: 40px; animation: pulse 2s ease-in-out infinite; }
      .bolt-icon { font-size: 100px; color: #fbbf24; filter: drop-shadow(0 0 30px rgba(251,191,36,0.8)); animation: electricPulse 2s ease-in-out infinite; display: inline-block; }
      @keyframes electricPulse { 0%,100% { transform: scale(1); filter: drop-shadow(0 0 30px rgba(251,191,36,0.8)); } 50% { transform: scale(1.1); filter: drop-shadow(0 0 50px rgba(251,191,36,1)); } }
      .brand-name { font-family: 'Orbitron', sans-serif; font-size: clamp(50px,10vw,120px); font-weight: 900; background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 50%, #93c5fd 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 8px; margin-bottom: 20px; animation: glowText 3s ease-in-out infinite; text-transform: uppercase; }
      @keyframes glowText { 0%,100% { filter: drop-shadow(0 0 20px rgba(59,130,246,0.6)); } 50% { filter: drop-shadow(0 0 40px rgba(59,130,246,1)); } }
      .tagline { font-size: clamp(18px,3vw,28px); color: #93c5fd; font-weight: 300; letter-spacing: 6px; margin-bottom: 60px; animation: fadeIn 2s ease-out 0.5s both; text-transform: uppercase; }
      .loading-container { width: 400px; max-width: 90%; margin: 0 auto; animation: fadeIn 2s ease-out 1s both; }
      .loading-text { color: #60a5fa; font-size: 14px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; font-weight: 500; }
      .loading-bar { width: 100%; height: 6px; background: rgba(59,130,246,0.2); border-radius: 10px; overflow: hidden; position: relative; box-shadow: 0 0 20px rgba(59,130,246,0.3); }
      .loading-progress { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa, #93c5fd); border-radius: 10px; width: 0%; animation: load 3s ease-out forwards; box-shadow: 0 0 20px rgba(59,130,246,0.8); position: relative; }
      .loading-progress::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 1.5s infinite; }
      @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
      @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
      .percentage { color: #fbbf24; font-size: 36px; font-weight: 700; margin-top: 20px; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 20px rgba(251,191,36,0.6); }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      .intro-container.fade-out { animation: fadeOut 1s ease-out forwards; }
      @keyframes fadeOut { to { opacity: 0; transform: scale(1.1); } }
      @media (max-width: 768px) { .brand-name { letter-spacing: 4px; } .tagline { letter-spacing: 3px; } .bolt-icon { font-size: 60px; } }
    </style>
  </head>
  <body>
    <div class="intro-container">
      <div class="grid-bg"></div>
      <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div>
      </div>
      <div class="intro-content">
        <div class="logo-container"><div class="bolt-icon">⚡</div></div>
        <h1 class="brand-name">ElectroSky</h1>
        <p class="tagline">Ultimate Tech Experience</p>
        <div class="loading-container">
          <div class="loading-text">Loading Your Experience...</div>
          <div class="loading-bar"><div class="loading-progress"></div></div>
          <div class="percentage">0%</div>
        </div>
      </div>
    </div>
    <script>
      let count = 0;
      const percentageEl = document.querySelector('.percentage');
      const introContainer = document.querySelector('.intro-container');
      const counter = setInterval(() => {
        count += Math.floor(Math.random() * 15) + 1;
        if (count >= 100) {
          count = 100;
          percentageEl.textContent = '100%';
          clearInterval(counter);
          setTimeout(() => {
            introContainer.classList.add('fade-out');
            setTimeout(() => {
              window.location.href = 'home.html'; // ✅ FIX: كان home.html
            }, 1000);
          }, 500);
        } else {
          percentageEl.textContent = count + '%';
        }
      }, 100);
    </script>
  </body>
</html>
